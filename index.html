<!doctype html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>FORM Launcher</title>
  <link rel="stylesheet" href="public/css/styles.css">
</head>
<body>
  <div class="app-shell">
    <header class="site-header">
      <div>
        <p class="eyebrow">GitHub Pages · FORM</p>
        <h1>FORM 실행 페이지</h1>
      </div>
      <!-- <a class="text-link" href="FORM/TEST01.html">TEST01 바로가기</a> -->
    </header>

    <main class="launcher-main">
      <section class="panel launcher-panel" aria-labelledby="launcherTitle">
        <div class="panel-heading">
          <h2 id="launcherTitle">실행할 FORM 선택</h2>
          <span>FORM/*.html</span>
        </div>

        <form id="formLauncher" class="launcher-form">
          <label for="formFile">FORM 파일</label>
          <div class="launcher-row">
            <select id="formFile" name="formFile">
              <option value="FORM/TEST01.html">TEST01.html</option>
            </select>
            <button type="submit">실행</button>
          </div>
        </form>
      </section>
    </main>

    <footer class="site-footer">
      <span>GitHub Pages 시작 파일: <strong>index.html</strong></span>
      <span>FORM 파일 위치: <strong>FORM/</strong></span>
    </footer>
  </div>

  <script>
    document.getElementById('formLauncher').addEventListener('submit', function (event) {
      event.preventDefault();
      window.location.href = document.getElementById('formFile').value;
    });
  </script>
</body>
</html>
